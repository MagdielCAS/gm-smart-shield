services:
  web:
    build:
      context: apps/web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - api

  api:
    build:
      context: apps/api
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - ENABLE_METRICS=true
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      # Override paths for container environment
      - SQLITE_URL=sqlite:////app/data/db/gm_shield.db
      - CHROMA_PERSIST_DIRECTORY=/app/data/chroma
      - UPLOADS_DIRECTORY=/app/data/uploads
    volumes:
      # Map host data directories to container
      - ./data/db:/app/data/db
      - ./data/chroma:/app/data/chroma
      - ./data/uploads:/app/data/uploads
    depends_on:
      - prometheus

  prometheus:
    image: prom/prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./ops/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus

  grafana:
    image: grafana/grafana
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin  # Change in production

volumes:
  prometheus_data:
  grafana_data:
